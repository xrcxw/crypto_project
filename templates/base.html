<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Криптоаналитик{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0d1117; color: #e6edf3; }
        .card { background: #161b22; border: 1px solid #30363d; }
        .card-title { color: white !important; }
        .card-text { color: #e6edf3 !important; }
        .btn-primary { background: #238636; border-color: #238636; }
        .btn-primary:hover { background: #2ea043; }
        .navbar { background: #010409; }
        .text-white { color: white !important; }
        .text-muted { color: #8b949e !important; }
        .btn-outline-light:hover { background: #30363d; }
        .btn-outline-danger:hover { background: #da3633; border-color: #da3633; }
        .btn-outline-secondary { color: #e6edf3; border-color: #30363d; }
        .btn-outline-secondary:hover { background: #30363d; color: white; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="{% url 'index' %}">📈 Криптоаналитик</a>
            <div class="ms-auto">
                {% if user.is_authenticated %}
                    <span class="text-light me-3">👤 {{ user.username }}</span>
                    <a href="{% url 'watchlist' %}" class="btn btn-outline-light btn-sm me-2">⭐ Избранное</a>
                    <form method="post" action="{% url 'logout' %}" style="display: inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-danger btn-sm">🚪 Выйти</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm me-2">🔐 Войти</a>
                    <a href="{% url 'signup' %}" class="btn btn-primary btn-sm">📝 Регистрация</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
